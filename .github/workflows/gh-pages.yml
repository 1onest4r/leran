name: Deploy to GitHub Pages

on:
  push:
    branches:
      - web # Change this if your default branch is 'master'

# Gives the Action permission to push the built web files to the gh-pages branch
permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable" # or 'master' if you are using master

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        # IMPORTANT: Replace YOUR_REPO_NAME with your exact GitHub repository name!
        run: flutter build web --base-href "/leran/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
