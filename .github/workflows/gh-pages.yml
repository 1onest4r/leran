name: Deploy to GitHub Pages

on:
  push:
    branches:
      - web # Change this if your default branch is 'master'

# Gives the Action permission to push the built web files to the gh-pages branch
permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install Dependencies
        run: flutter pub get

      # ADD THIS NEW STEP HERE!
      - name: Fix Isar Integer Bug for Web
        run: find lib -name "*.g.dart" -exec sed -i -E 's/-?[0-9]{16,}/123456789/g' {} +

      - name: Build Web
        run: flutter build web --base-href "/leran/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
